name: Coq Proof Verification

on: [push, pull_request]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Compile Coq File
      uses: coq-community/docker-coq-action@v1
      with:
        coq_version: 'latest'
        script: |
          /home/rocq/.opam/4.14.2+flambda/bin/coqc hello.v
